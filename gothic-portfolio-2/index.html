<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Developer Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px); border-bottom: 1px solid #9b59b6;
    }
    .topbar-title { color: #9b59b6; font-weight: bold; }
    .topbar-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    button, .topbar-link {
      background: rgba(155,89,182,0.2); border: 1px solid #9b59b6;
      color: #c9a0dc; padding: 5px 12px; border-radius: 20px;
      cursor: pointer; font-size: 12px; transition: all 0.2s;
      text-decoration: none; font-family: inherit;
    }
    button:hover, .topbar-link:hover { background: #9b59b6; color: white; }
    
    .panel {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 450px; background: rgba(0,0,0,0.95);
      border: 1px solid #9b59b6; border-radius: 15px; z-index: 100;
      padding: 15px; transition: all 0.3s; backdrop-filter: blur(10px);
    }
    .panel.hidden { opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(20px); }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    #panel-title { color: #9b59b6; font-size: 18px; }
    #panel-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    #panel-body { color: #ccc; font-size: 14px; line-height: 1.5; max-height: 200px; overflow-y: auto; }
    .panel-footer { display: flex; justify-content: space-between; margin-top: 15px; }
    .swatch-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    
    #tooltip {
      position: fixed; background: rgba(0,0,0,0.9); color: #9b59b6;
      padding: 5px 12px; border-radius: 20px; font-size: 12px;
      pointer-events: none; z-index: 200; white-space: nowrap;
      border: 1px solid #9b59b6;
    }
    #tooltip.hidden { display: none; }
    
    #loading {
      position: fixed; inset: 0; background: #0a0a1a; display: flex;
      align-items: center; justify-content: center; z-index: 1000;
      flex-direction: column; gap: 20px;
    }
    .loading-rune { font-size: 50px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    #loading-bar { width: 200px; height: 3px; background: #333; border-radius: 3px; overflow: hidden; }
    #loading-fill { width: 0%; height: 100%; background: #9b59b6; transition: width 0.3s; }
    
    #hint {
      position: fixed; bottom: 10px; right: 10px; font-size: 10px;
      color: #666; background: rgba(0,0,0,0.5); padding: 5px 10px;
      border-radius: 10px; pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="topbar">
    <span class="topbar-title">🎮 Game Developer Portfolio</span>
    <div class="topbar-btns">
      <button id="btn-night">🌙 Night</button>
      <button id="btn-sound">♪ Sound</button>
      <button id="btn-weather">🔥 Embers</button>
      <button id="btn-bloom">✨ Bloom: ON</button>
      <button id="btn-vignette">🎭 Vignette: ON</button>
      <a href="./ar.html" class="topbar-link">◈ AR</a>
    </div>
  </div>

  <div id="panel" class="panel hidden">
    <div class="panel-header">
      <span id="panel-icon">🎮</span>
      <h2 id="panel-title">Title</h2>
      <button id="panel-close">✕</button>
    </div>
    <div id="panel-body"></div>
    <div class="panel-footer">
      <button id="panel-prev">← Previous</button>
      <button id="panel-next">Next →</button>
    </div>
  </div>

  <div id="tooltip" class="hidden"></div>
  <div id="hint">Click objects · Drag to orbit · Scroll to zoom</div>

  <div id="loading">
    <div class="loading-rune">🎮</div>
    <p id="loading-text">Loading 3D Scene...</p>
    <div id="loading-bar"><div id="loading-fill"></div></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    
    // --- Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 3, 8);
    camera.lookAt(0, 1, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    
    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.zoomSpeed = 1.2;
    controls.rotateSpeed = 1.0;
    controls.target.set(0, 1.2, 0);
    
    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffdd99, 1.2);
    mainLight.position.set(3, 5, 2);
    mainLight.castShadow = true;
    mainLight.receiveShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x8866cc, 0.4);
    fillLight.position.set(-2, 2, -1);
    scene.add(fillLight);
    
    const backLight = new THREE.PointLight(0xffaa66, 0.3);
    backLight.position.set(0, 1.5, -2);
    scene.add(backLight);
    
    // --- Post Processing ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.3, 0.4);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.5;
    bloomPass.radius = 0.3;
    
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    
    let bloomEnabled = true;
    
    // --- Helper cube (fallback if model doesn't load) ---
    const createFallbackScene = () => {
      // Ground
      const gridHelper = new THREE.GridHelper(20, 20, 0x9b59b6, 0x3d2a4a);
      gridHelper.position.y = -0.5;
      scene.add(gridHelper);
      
      // Floating cubes
      for (let i = 0; i < 6; i++) {
        const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const material = new THREE.MeshStandardMaterial({ color: 0x9b59b6, metalness: 0.7, roughness: 0.3, emissive: 0x3a0a5a, emissiveIntensity: 0.3 });
        const cube = new THREE.Mesh(geometry, material);
        cube.position.set(Math.sin(i) * 3, 0.5, Math.cos(i * 1.5) * 3);
        cube.castShadow = true;
        cube.userData = { label: `Object ${i+1}`, title: 'Demo Object', text: ['Click me!', 'This is a fallback object', 'Your 3D model will appear here'] };
        scene.add(cube);
      }
      
      // Center pedestal
      const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(1.2, 1.5, 0.5, 8),
        new THREE.MeshStandardMaterial({ color: 0x6c3483, metalness: 0.8, roughness: 0.2 })
      );
      pedestal.position.y = -0.2;
      pedestal.castShadow = true;
      scene.add(pedestal);
    };
    
    // --- Load 3D Model with multiple path attempts ---
    let modelLoaded = false;
    const pathsToTry = [
      '/3js-Project/gothic-portfolio-2/public/models/scene.glb',
      '/3js-Project/gothic-portfolio-2/models/scene.glb',
      './public/models/scene.glb',
      './models/scene.glb'
    ];
    
    let currentPathIndex = 0;
    const loader = new GLTFLoader();
    const loadingEl = document.getElementById('loading');
    const fillBar = document.getElementById('loading-fill');
    const loadText = document.getElementById('loading-text');
    
    function tryLoadModel() {
      if (currentPathIndex >= pathsToTry.length) {
        console.error('❌ All model paths failed, using fallback scene');
        loadText.textContent = '✨ Using interactive demo scene';
        setTimeout(() => {
          if (loadingEl) loadingEl.style.display = 'none';
        }, 1000);
        createFallbackScene();
        return;
      }
      
      const modelPath = pathsToTry[currentPathIndex];
      console.log(`🔍 Trying path ${currentPathIndex + 1}/${pathsToTry.length}: ${modelPath}`);
      loadText.textContent = `Loading 3D model... (attempt ${currentPathIndex + 1})`;
      
      loader.load(modelPath,
        (gltf) => {
          console.log('✅✅✅ MODEL LOADED SUCCESSFULLY! ✅✅✅');
          console.log('🎉 Path that worked:', modelPath);
          modelLoaded = true;
          const model = gltf.scene;
          
          model.traverse(child => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) {
                child.material.metalness = 0.6;
                child.material.roughness = 0.4;
              }
            }
          });
          
          scene.add(model);
          
          setTimeout(() => {
            if (loadingEl) loadingEl.style.display = 'none';
          }, 500);
        },
        (xhr) => {
          if (xhr.lengthComputable) {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            if (fillBar) fillBar.style.width = `${pct}%`;
            if (loadText) loadText.textContent = `Loading 3D Scene... ${pct}%`;
          }
        },
        (error) => {
          console.warn(`❌ Failed with path: ${modelPath}`);
          currentPathIndex++;
          tryLoadModel();
        }
      );
    }
    
    tryLoadModel();
    
    // --- Particles (floating embers) ---
    const particleCount = 800;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i*3] = (Math.random() - 0.5) * 15;
      particlePositions[i*3+1] = Math.random() * 6;
      particlePositions[i*3+2] = (Math.random() - 0.5) * 15;
      
      // Warm colors
      const colorChoice = Math.random();
      if (colorChoice < 0.6) {
        particleColors[i*3] = 1.0;
        particleColors[i*3+1] = 0.4 + Math.random() * 0.4;
        particleColors[i*3+2] = 0.1 + Math.random() * 0.2;
      } else if (colorChoice < 0.8) {
        particleColors[i*3] = 0.8 + Math.random() * 0.2;
        particleColors[i*3+1] = 0.2 + Math.random() * 0.3;
        particleColors[i*3+2] = 0.5 + Math.random() * 0.4;
      } else {
        particleColors[i*3] = 0.5 + Math.random() * 0.3;
        particleColors[i*3+1] = 0.3 + Math.random() * 0.3;
        particleColors[i*3+2] = 1.0;
      }
    }
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    
    const particleMaterial = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
    
    // --- Animation Loop ---
    let time = 0;
    let weatherMode = 0;
    
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      
      // Animate particles
      particles.rotation.y = time * 0.03;
      particles.rotation.x = Math.sin(time * 0.2) * 0.1;
      
      // Animate lights
      mainLight.intensity = 1.0 + Math.sin(time * 0.5) * 0.1;
      backLight.intensity = 0.3 + Math.sin(time * 0.8) * 0.1;
      
      // Update bloom strength based on weather
      if (bloomEnabled) {
        const strengths = [0.5, 0.3, 0.4, 0.6];
        bloomPass.strength = strengths[weatherMode];
      }
      
      controls.update();
      composer.render();
    }
    animate();
    
    // --- Button Handlers ---
    let isNight = false;
    window.toggleDayNight = () => {
      isNight = !isNight;
      scene.background.setHex(isNight ? 0x0a0a1a : 0x1a2a4a);
      scene.fog.color.setHex(isNight ? 0x0a0a1a : 0x1a2a4a);
      mainLight.intensity = isNight ? 0.6 : 1.2;
      ambientLight.intensity = isNight ? 0.3 : 0.6;
      document.getElementById('btn-night').textContent = isNight ? '☀ Day' : '🌙 Night';
    };
    
    let soundOn = false;
    window.toggleSound = () => {
      soundOn = !soundOn;
      document.getElementById('btn-sound').textContent = soundOn ? '♪ ON' : '♪ Sound';
    };
    
    const weatherNames = ['🔥 Embers', '🌧 Rain', '❄️ Snow', '💨 Ash'];
    window.toggleWeather = () => {
      weatherMode = (weatherMode + 1) % weatherNames.length;
      document.getElementById('btn-weather').textContent = weatherNames[weatherMode];
      
      // Change particle colors based on weather
      const colors = [
        [1.0, 0.5, 0.2],  // Embers
        [0.5, 0.6, 1.0],  // Rain
        [0.8, 0.9, 1.0],  // Snow
        [0.6, 0.5, 0.5]   // Ash
      ];
      particleMaterial.color.setRGB(colors[weatherMode][0], colors[weatherMode][1], colors[weatherMode][2]);
    };
    
    window.toggleBloom = () => {
      bloomEnabled = !bloomEnabled;
      bloomPass.enabled = bloomEnabled;
      document.getElementById('btn-bloom').textContent = bloomEnabled ? '✨ Bloom: ON' : '✨ Bloom: OFF';
    };
    
    window.toggleVignette = () => {
      // Simple vignette effect through CSS
      const vignetteEnabled = document.getElementById('btn-vignette').textContent.includes('ON');
      if (vignetteEnabled) {
        document.getElementById('btn-vignette').textContent = '🎭 Vignette: OFF';
        renderer.domElement.style.boxShadow = 'none';
      } else {
        document.getElementById('btn-vignette').textContent = '🎭 Vignette: ON';
        renderer.domElement.style.boxShadow = 'inset 0 0 50px rgba(0,0,0,0.5)';
      }
    };
    
    // Attach events
    document.getElementById('btn-night').onclick = () => window.toggleDayNight();
    document.getElementById('btn-sound').onclick = () => window.toggleSound();
    document.getElementById('btn-weather').onclick = () => window.toggleWeather();
    document.getElementById('btn-bloom').onclick = () => window.toggleBloom();
    document.getElementById('btn-vignette').onclick = () => window.toggleVignette();
    document.getElementById('panel-close').onclick = () => document.getElementById('panel').classList.add('hidden');
    
    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('🚀 Portfolio ready!');
  </script>
</body>
</html>
