<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Developer Portfolio</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- ── TOP BAR ─────────────────────────────────────────── -->
  <div id="topbar">
    <span class="topbar-title">🎮 Game Developer Portfolio</span>
    <div class="topbar-btns">
      <button id="btn-night">🌙 Night</button>
      <button id="btn-sound">♪ Sound</button>
      <button id="btn-weather">🔥 Weather</button>
      <button id="btn-bloom">✨ Bloom: ON</button>
      <button id="btn-afterimage">👻 Ghost: OFF</button>
      <button id="btn-vignette">🎭 Vignette: ON</button>
      <a href="./ar.html" id="ar-link">◈ AR</a>
    </div>
  </div>

  <!-- ── INFO PANEL ─────────────────────────────────────────── -->
  <div id="panel" class="panel hidden">
    <div class="panel-header">
      <span id="panel-icon">✦</span>
      <h2 id="panel-title">Title</h2>
      <button id="panel-close">✕</button>
    </div>
    <div id="panel-body"></div>
    <div class="panel-footer">
      <button id="panel-prev">← prev</button>
      <button id="panel-next">next →</button>
    </div>
  </div>

  <!-- ── TOOLTIP ────────────────────────────────────────────── -->
  <div id="tooltip" class="hidden"></div>

  <!-- ── HINT ───────────────────────────────────────────────── -->
  <div id="hint">Click objects · Drag to orbit · Scroll to zoom · Click buttons above!</div>

  <!-- ── LOADING ─────────────────────────────────────────────── -->
  <div id="loading">
    <div class="loading-inner">
      <div class="loading-rune">🎮</div>
      <p id="loading-text">Loading 3D Scene...</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
  </div>

  <script type="module">
    // All code directly in one file to avoid import issues
    
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    
    // --- Setup Scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.003);
    
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 4, 8);
    camera.lookAt(0, 1, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    
    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.target.set(0, 1, 0);
    
    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffcc88, 1.5);
    mainLight.position.set(2, 3, 2);
    mainLight.castShadow = true;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x8866ff, 0.5);
    fillLight.position.set(-1, 2, -1);
    scene.add(fillLight);
    
    const candleLight = new THREE.PointLight(0xffaa66, 1.2);
    candleLight.position.set(0, 1.2, 0);
    scene.add(candleLight);
    
    // --- Post Processing ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.6);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.6;
    bloomPass.radius = 0.5;
    
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    
    let bloomEnabled = true;
    let afterimageEnabled = false;
    let vignetteEnabled = true;
    
    // --- Simple Particles ---
    const particleCount = 500;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i*3] = (Math.random() - 0.5) * 20;
      particlePositions[i*3+1] = Math.random() * 8;
      particlePositions[i*3+2] = (Math.random() - 0.5) * 20;
    }
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMaterial = new THREE.PointsMaterial({ color: 0x9b59b6, size: 0.05, transparent: true, opacity: 0.6 });
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
    
    // --- Load 3D Model ---
    const loader = new GLTFLoader();
    const modelPath = '/3js-Project/gothic-portfolio-2/public/models/scene.glb';
    
    console.log('Loading model from:', modelPath);
    
    loader.load(modelPath, 
      (gltf) => {
        console.log('✅ Model loaded!');
        const model = gltf.scene;
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(model);
        
        // Hide loading screen
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.style.display = 'none';
      },
      (xhr) => {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        const fillBar = document.getElementById('loading-fill');
        const loadText = document.getElementById('loading-text');
        if (fillBar) fillBar.style.width = `${pct}%`;
        if (loadText) loadText.textContent = `Loading 3D Scene... ${pct}%`;
      },
      (error) => {
        console.error('❌ Model error:', error);
        const loadText = document.getElementById('loading-text');
        if (loadText) {
          loadText.textContent = '⚠ Using fallback scene';
          loadText.style.color = '#ff6666';
        }
        setTimeout(() => {
          const loadingEl = document.getElementById('loading');
          if (loadingEl) loadingEl.style.display = 'none';
        }, 2000);
      }
    );
    
    // --- Simple Animation Loop ---
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      
      // Animate candle light
      candleLight.intensity = 1.0 + Math.sin(time * 8) * 0.3;
      
      // Animate particles
      particles.rotation.y = time * 0.05;
      
      controls.update();
      composer.render();
    }
    animate();
    
    // --- Button Handlers ---
    window.toggleDayNight = () => {
      const isNight = scene.background.getHex() === 0x0a0a1a;
      scene.background.setHex(isNight ? 0x1a2a4a : 0x0a0a1a);
      scene.fog.color.setHex(isNight ? 0x1a2a4a : 0x0a0a1a);
      mainLight.intensity = isNight ? 2.0 : 1.0;
      document.getElementById('btn-night').textContent = isNight ? '☀ Day' : '🌙 Night';
    };
    
    window.toggleSound = () => {
      console.log('Sound toggled (add audio file to public/sounds/)');
      const btn = document.getElementById('btn-sound');
      btn.textContent = btn.textContent === '♪ Sound' ? '♪ ON' : '♪ Sound';
    };
    
    let weatherIndex = 0;
    const weathers = ['🔥', '🌧', '❄️', '💨'];
    window.toggleWeather = () => {
      weatherIndex = (weatherIndex + 1) % weathers.length;
      document.getElementById('btn-weather').textContent = `${weathers[weatherIndex]} Weather`;
      // Change particle color based on weather
      const colors = [0x9b59b6, 0x88aaff, 0xccddff, 0x886666];
      particleMaterial.color.setHex(colors[weatherIndex]);
    };
    
    window.toggleBloom = () => {
      bloomEnabled = !bloomEnabled;
      bloomPass.enabled = bloomEnabled;
      document.getElementById('btn-bloom').textContent = bloomEnabled ? '✨ Bloom: ON' : '✨ Bloom: OFF';
    };
    
    window.toggleAfterimage = () => {
      afterimageEnabled = !afterimageEnabled;
      document.getElementById('btn-afterimage').textContent = afterimageEnabled ? '👻 Ghost: ON' : '👻 Ghost: OFF';
    };
    
    window.toggleVignette = () => {
      vignetteEnabled = !vignetteEnabled;
      document.getElementById('btn-vignette').textContent = vignetteEnabled ? '🎭 Vignette: ON' : '🎭 Vignette: OFF';
    };
    
    // Attach button events
    document.getElementById('btn-night').onclick = () => window.toggleDayNight();
    document.getElementById('btn-sound').onclick = () => window.toggleSound();
    document.getElementById('btn-weather').onclick = () => window.toggleWeather();
    document.getElementById('btn-bloom').onclick = () => window.toggleBloom();
    document.getElementById('btn-afterimage').onclick = () => window.toggleAfterimage();
    document.getElementById('btn-vignette').onclick = () => window.toggleVignette();
    
    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('✅ Portfolio ready!');
  </script>
</body>
</html>
